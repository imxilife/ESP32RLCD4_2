; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = arduino
; deep+ 模式让 LDF 递归扫描库文件的 #include，解决 lib 间传递依赖
lib_ldf_mode = deep+
lib_deps =
    adafruit/Adafruit SHTC3 Library
    tzapu/WiFiManager
    https://github.com/pschatzmann/ESP32-A2DP.git
; ESP32-S3 不支持 Bluetooth Classic (A2DP)，忽略 ESP32-A2DP 库避免编译报错
; 迁移到原版 ESP32 开发板时删除此行即可启用蓝牙音频功能
lib_ignore = ESP32-A2DP
; 降低上传波特率可减少 "No serial data received"（高波特率时线缆/驱动易丢数据）
upload_speed = 115200
