; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
; 项目内 lib/ 已通过 build_src_filter 作为源码树直接参与编译，
; 避免 PlatformIO 再把 lib/ 识别成“私有库目录”导致重复编译与头文件解析不一致。
lib_dir = .pio/local-lib

[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = arduino
board_build.partitions = partitions.csv
; 当前工程的 lib/ 是按源码树组织，不是 PlatformIO 的“每个一级子目录一个私有库”结构。
; 将项目根目录作为 src_dir，并显式纳入 src/ 与 lib/，同时排除设备侧测试代码。
build_src_filter =
    +<src/>
    +<lib/>
    -<lib/tests/>
    +<lib/tests/sdcard/>
    +<lib/tests/mp3/>
build_flags =
    -Ilib
    -DAPP_VERSION=\"0.1.0\"
    -DOTA_MANIFEST_URL=\"\"
; deep+ 模式让 LDF 递归扫描库文件的 #include，解决 lib 间传递依赖
lib_ldf_mode = deep+
lib_deps =
    adafruit/Adafruit SHTC3 Library
    tzapu/WiFiManager
    https://github.com/pschatzmann/ESP32-A2DP.git
; ESP32-S3 不支持 Bluetooth Classic (A2DP)，忽略 ESP32-A2DP 库避免编译报错
; 迁移到原版 ESP32 开发板时删除此行即可启用蓝牙音频功能
lib_ignore = ESP32-A2DP
; 降低上传波特率可减少 "No serial data received"（高波特率时线缆/驱动易丢数据）
upload_speed = 115200
